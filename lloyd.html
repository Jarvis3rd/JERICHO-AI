<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Jericho" />
  <meta name="theme-color" content="#080810" />
  <title>Jericho — Personal</title>
  <link rel="apple-touch-icon" href="https://jarvis3rd.github.io/JERICHO-AI/icons/icon-192.png" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold:  #c8960c;
      --dark:  #080810;
      --dark3: #13131f;
    }

    html, body {
      height: 100%; width: 100%;
      background: var(--dark);
      color: #e0e0e8;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      overflow: hidden;
      -webkit-user-select: none; user-select: none;
    }

    .bg-glow {
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background:
        radial-gradient(ellipse 40% 40% at 50% 38%, rgba(0,180,255,0.07) 0%, transparent 70%),
        radial-gradient(ellipse 70% 50% at 50% 38%, rgba(200,150,12,0.04) 0%, transparent 80%);
    }

    .header {
      position: fixed; top: 0; left: 0; right: 0; z-index: 10;
      padding-top: env(safe-area-inset-top, 0);
      height: calc(52px + env(safe-area-inset-top, 0));
      display: flex; justify-content: space-between; align-items: flex-end;
      padding-left: 20px; padding-right: 20px; padding-bottom: 10px;
      background: linear-gradient(to bottom, rgba(8,8,16,0.95) 70%, transparent);
    }
    .header-logo {
      font-size: 0.62rem; font-weight: 700; letter-spacing: 3px;
      text-transform: uppercase; color: var(--gold); opacity: 0.75;
    }
    .header-badge {
      font-size: 0.58rem; font-weight: 700; letter-spacing: 2px;
      text-transform: uppercase; color: #50c878;
      border: 1px solid #50c87840; padding: 3px 10px; border-radius: 20px;
      background: #50c87810;
    }

    .screen {
      position: fixed; inset: 0; z-index: 1;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 80px 24px 160px;
      pointer-events: none;
    }

    .avatar-zone { display: flex; flex-direction: column; align-items: center; margin-bottom: 32px; }

    .avatar-ring {
      position: relative;
      width: 140px; height: 140px;
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 22px;
    }

    .ring1, .ring2 {
      position: absolute; border-radius: 50%;
      border: 1px solid rgba(200,150,12,0.2);
      animation: ring-idle 3s ease-in-out infinite;
    }
    .ring1 { inset: -14px; }
    .ring2 { inset: -28px; animation-delay: 0.7s; opacity: 0.5; }

    @keyframes ring-idle {
      0%,100% { transform: scale(1);    opacity: 0.25; }
      50%      { transform: scale(1.03); opacity: 0.55; }
    }

    .avatar-ring.speaking .ring1,
    .avatar-ring.speaking .ring2 {
      border-color: rgba(200,150,12,0.7);
      animation: ring-speak 0.7s ease-in-out infinite;
    }
    .avatar-ring.speaking .ring2 { animation-delay: 0.15s; }
    @keyframes ring-speak {
      0%,100% { transform: scale(1);    opacity: 0.5; }
      50%      { transform: scale(1.07); opacity: 1;   }
    }

    .avatar-ring.listening .ring1,
    .avatar-ring.listening .ring2 {
      border-color: rgba(74,158,255,0.5);
      animation: ring-listen 1.1s ease-in-out infinite;
    }
    @keyframes ring-listen {
      0%,100% { transform: scale(1);    opacity: 0.35; }
      50%      { transform: scale(1.05); opacity: 0.75; }
    }

    /* ── ARC REACTOR ── */
    .arc-reactor {
      width: 100px; height: 100px;
      border-radius: 50%;
      background: radial-gradient(circle at 50% 50%, #001828 0%, #000812 60%, #000408 100%);
      border: 2px solid rgba(0,180,255,0.35);
      box-shadow: 0 0 22px rgba(0,170,255,0.22), 0 0 50px rgba(0,120,200,0.1), inset 0 0 18px rgba(0,150,230,0.08);
      display: flex; align-items: center; justify-content: center;
      z-index: 1; position: relative;
      transition: border-color 0.4s, box-shadow 0.4s;
    }

    /* Outer slow-rotating ring */
    .arc-r1 {
      position: absolute;
      width: 84px; height: 84px; border-radius: 50%;
      border: 1.5px solid transparent;
      border-top-color: rgba(0,210,255,0.85);
      border-right-color: rgba(0,180,255,0.3);
      border-bottom-color: rgba(0,160,230,0.1);
      animation: arc-spin-cw 7s linear infinite;
    }
    /* Counter-rotating middle ring */
    .arc-r2 {
      position: absolute;
      width: 64px; height: 64px; border-radius: 50%;
      border: 1.5px solid transparent;
      border-bottom-color: rgba(0,220,255,0.9);
      border-left-color: rgba(0,190,255,0.35);
      border-top-color: rgba(0,160,220,0.1);
      animation: arc-spin-ccw 4.5s linear infinite;
    }
    /* Inner fast ring */
    .arc-r3 {
      position: absolute;
      width: 46px; height: 46px; border-radius: 50%;
      border: 1px solid rgba(80,200,255,0.4);
      border-right-color: rgba(0,220,255,0.85);
      border-left-color: transparent;
      animation: arc-spin-cw 2.8s linear infinite;
      box-shadow: 0 0 6px rgba(0,200,255,0.2);
    }

    /* Iron Man triangle - top point */
    .arc-tri {
      position: absolute;
      width: 28px; height: 28px;
      border-left: 14px solid transparent;
      border-right: 14px solid transparent;
      border-bottom: 24px solid rgba(0,170,255,0.13);
      top: 26px;
      filter: drop-shadow(0 0 5px rgba(0,200,255,0.45));
    }
    /* Triangle inverted - bottom */
    .arc-tri2 {
      position: absolute;
      width: 28px; height: 28px;
      border-left: 11px solid transparent;
      border-right: 11px solid transparent;
      border-top: 19px solid rgba(0,160,255,0.1);
      bottom: 24px;
      filter: drop-shadow(0 0 4px rgba(0,180,255,0.35));
    }

    /* Glowing center core */
    .arc-core {
      position: absolute;
      width: 20px; height: 20px; border-radius: 50%;
      background: radial-gradient(circle at 38% 38%, #aaeeff 0%, #22bbff 35%, #0077cc 70%, #003366 100%);
      box-shadow:
        0 0 10px rgba(0,200,255,0.95),
        0 0 22px rgba(0,170,255,0.7),
        0 0 40px rgba(0,140,220,0.4),
        0 0 70px rgba(0,100,200,0.2);
      animation: arc-core-pulse 2.2s ease-in-out infinite;
      z-index: 2;
    }

    @keyframes arc-spin-cw  { from { transform: rotate(0deg); }    to { transform: rotate(360deg); } }
    @keyframes arc-spin-ccw { from { transform: rotate(0deg); }    to { transform: rotate(-360deg); } }

    @keyframes arc-core-pulse {
      0%,100% {
        box-shadow: 0 0 10px rgba(0,200,255,0.95), 0 0 22px rgba(0,170,255,0.7),
                    0 0 40px rgba(0,140,220,0.4),  0 0 70px rgba(0,100,200,0.2);
        transform: scale(1);
      }
      50% {
        box-shadow: 0 0 14px rgba(0,220,255,1),    0 0 30px rgba(0,190,255,0.9),
                    0 0 55px rgba(0,160,240,0.55), 0 0 90px rgba(0,120,220,0.3);
        transform: scale(1.08);
      }
    }

    /* Speaking — arc reactor blazes bright blue */
    .avatar-ring.speaking .arc-reactor {
      border-color: rgba(0,210,255,0.7);
      box-shadow: 0 0 35px rgba(0,190,255,0.55), 0 0 70px rgba(0,150,230,0.25), inset 0 0 25px rgba(0,180,255,0.15);
    }
    .avatar-ring.speaking .arc-r1 { animation-duration: 2.5s; border-top-color: rgba(0,230,255,1); }
    .avatar-ring.speaking .arc-r2 { animation-duration: 1.8s; border-bottom-color: rgba(0,240,255,1); }
    .avatar-ring.speaking .arc-r3 { animation-duration: 1s;   border-right-color: rgba(100,240,255,1); }
    .avatar-ring.speaking .arc-core { animation-duration: 0.6s; }

    /* Listening — cooler teal tones, gentler */
    .avatar-ring.listening .arc-reactor {
      border-color: rgba(0,230,200,0.5);
      box-shadow: 0 0 22px rgba(0,210,180,0.3), 0 0 45px rgba(0,180,160,0.15), inset 0 0 15px rgba(0,200,170,0.08);
    }
    .avatar-ring.listening .arc-r1 { border-top-color: rgba(0,230,200,0.7); }
    .avatar-ring.listening .arc-r2 { border-bottom-color: rgba(0,220,190,0.75); }

    .avatar-name {
      font-size: 1.5rem; font-weight: 300; letter-spacing: 6px;
      text-transform: uppercase; color: #fff; margin-bottom: 5px;
    }
    .avatar-title {
      font-size: 0.68rem; font-weight: 600; letter-spacing: 3px;
      text-transform: uppercase; color: var(--gold); opacity: 0.75;
    }

    .status-text {
      margin-top: 24px;
      font-size: 0.8rem; letter-spacing: 0.5px;
      color: #555; min-height: 20px; text-align: center;
      transition: color 0.3s;
    }
    .status-text.active  { color: #aaa; }
    .status-text.success { color: #50c878; }
    .status-text.error   { color: #f87161; }

    .error-box {
      display: none;
      margin-top: 12px;
      background: rgba(248,113,97,0.08);
      border: 1px solid rgba(248,113,97,0.25);
      border-radius: 8px;
      padding: 10px 16px;
      font-size: 0.72rem; color: #f87161;
      max-width: 300px; text-align: center; line-height: 1.5;
      word-break: break-word;
    }
    .error-box.show { display: block; }

    .controls {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 5;
      padding: 16px 24px env(safe-area-inset-bottom, 20px);
      background: linear-gradient(to top, rgba(8,8,16,1) 50%, transparent);
      display: flex; flex-direction: column; align-items: center; gap: 14px;
      pointer-events: all;
    }

    .btn-connect {
      width: min(290px, 82vw); height: 54px;
      border-radius: 100px; border: none; cursor: pointer;
      font-size: 0.82rem; font-weight: 700; letter-spacing: 2px;
      text-transform: uppercase;
      display: flex; align-items: center; justify-content: center; gap: 10px;
      transition: opacity 0.2s, transform 0.15s;
      outline: none; -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }
    .btn-connect:active { transform: scale(0.97); opacity: 0.85; }

    .btn-connect.idle {
      background: linear-gradient(135deg, #c8960c, #a07008);
      color: #080810;
      box-shadow: 0 0 24px rgba(200,150,12,0.3), 0 4px 14px rgba(0,0,0,0.5);
    }

    .btn-connect.connected {
      background: rgba(248,113,97,0.12);
      color: #f87161;
      border: 1px solid rgba(248,113,97,0.35);
    }
    .btn-connect.connecting {
      background: rgba(200,150,12,0.08);
      color: var(--gold);
      border: 1px solid rgba(200,150,12,0.25);
      pointer-events: none;
    }

    .controls-row { display: flex; align-items: center; gap: 14px; }

    .btn-mute {
      width: 46px; height: 46px; border-radius: 50%;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      color: #777; font-size: 1rem;
      cursor: pointer; display: none; align-items: center; justify-content: center;
      transition: background 0.2s; outline: none;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }
    .btn-mute.visible { display: flex; }
    .btn-mute.muted { background: rgba(248,113,97,0.12); color: #f87161; border-color: rgba(248,113,97,0.3); }

    .dots { display: inline-flex; gap: 4px; align-items: center; }
    .dots span {
      width: 5px; height: 5px; border-radius: 50%; background: var(--gold);
      animation: dot 1.2s ease-in-out infinite;
    }
    .dots span:nth-child(2) { animation-delay: 0.2s; }
    .dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes dot { 0%,100%{opacity:0.2;transform:translateY(0)} 50%{opacity:1;transform:translateY(-3px)} }
  </style>
</head>
<body>

<div class="bg-glow"></div>

<div class="header">
  <div class="header-logo">Aperture Automations</div>
  <div class="header-badge" id="headerBadge">Personal</div>
</div>

<div class="screen">
  <div class="avatar-zone">
    <div class="avatar-ring" id="avatarRing">
      <div class="ring1"></div>
      <div class="ring2"></div>
      <div class="arc-reactor">
        <div class="arc-r1"></div>
        <div class="arc-r2"></div>
        <div class="arc-r3"></div>
        <div class="arc-tri"></div>
        <div class="arc-tri2"></div>
        <div class="arc-core"></div>
      </div>
    </div>
    <div class="avatar-name">Jericho</div>
    <div class="avatar-title">Personal AI Assistant</div>
  </div>

  <div class="status-text" id="statusText">Ready</div>
  <div class="error-box" id="errorBox"></div>
</div>

<div class="controls">
  <div class="controls-row">
    <button class="btn-mute" id="btnMute" type="button">🎤</button>
    <button class="btn-connect idle" id="btnConnect" type="button">
      <span id="btnIcon">🎙️</span>
      <span id="btnText">Talk to Jericho</span>
    </button>
    <button class="btn-mute" id="btnMute2" type="button">🎤</button>
  </div>
</div>

<!-- Catch global JS errors and display them -->
<script>
window.onerror = function(msg, src, line, col, err) {
  var box = document.getElementById('errorBox');
  if (box) {
    box.textContent = 'JS Error: ' + msg + (line ? ' (line ' + line + ')' : '');
    box.className = 'error-box show';
  }
  return false;
};
</script>

<!-- LiveKit client SDK - pinned to stable version -->
<script src="https://cdn.jsdelivr.net/npm/livekit-client@2.9.4/dist/livekit-client.umd.min.js"></script>

<script>
// Check SDK loaded
if (typeof LivekitClient === 'undefined') {
  document.getElementById('errorBox').textContent = 'LiveKit SDK failed to load. Please check your internet connection and refresh.';
  document.getElementById('errorBox').className = 'error-box show';
  document.getElementById('statusText').textContent = 'SDK not loaded';
  document.getElementById('statusText').className = 'status-text error';
}
</script>

<script>
var LIVEKIT_URL = 'wss://jerichoagent-uluhqyve.livekit.cloud';
var TOKEN = 'eyJ0eXAiOiJKV1QiLCJhbGciOiJIUzI1NiJ9.eyJpc3MiOiJBUEk0UU5BWlNxcXh0ZmUiLCJzdWIiOiJsbG95ZCIsIm5hbWUiOiJMbG95ZCIsIm5iZiI6MTc3NDIyNDMzNSwiZXhwIjoxODA1NzYwMzM1LCJ2aWRlbyI6eyJyb29tIjoibGxveWQtcGVyc29uYWwiLCJyb29tSm9pbiI6dHJ1ZSwiY2FuUHVibGlzaCI6dHJ1ZSwiY2FuU3Vic2NyaWJlIjp0cnVlLCJjYW5QdWJsaXNoRGF0YSI6dHJ1ZSwiYWdlbnQiOmZhbHNlfSwibWV0YWRhdGEiOiIifQ.KtPFqsXJhotg1z81x2SgcNVvm-99GsMxlOTvqjTpIGI';

var room      = null;
var muted     = false;
var connected = false;

var btnConnect  = document.getElementById('btnConnect');
var btnMute     = document.getElementById('btnMute');
var btnMute2    = document.getElementById('btnMute2');
var btnIcon     = document.getElementById('btnIcon');
var btnText     = document.getElementById('btnText');
var statusEl    = document.getElementById('statusText');
var errorBox    = document.getElementById('errorBox');
var avatarRing  = document.getElementById('avatarRing');

function setStatus(msg, cls) {
  statusEl.textContent = msg;
  statusEl.className = 'status-text' + (cls ? ' ' + cls : '');
}

function showError(msg) {
  errorBox.textContent = msg;
  errorBox.className = 'error-box show';
}

function clearError() {
  errorBox.className = 'error-box';
}

function setAvatar(state) {
  avatarRing.className = 'avatar-ring' + (state ? ' ' + state : '');
}

function showMute(show) {
  btnMute.className  = 'btn-mute' + (show ? ' visible' : '');
  btnMute2.className = 'btn-mute' + (show ? ' visible' : '');
}

function doConnect() {
  if (connected) { doDisconnect(); return; }

  clearError();
  btnConnect.className = 'btn-connect connecting';
  btnIcon.textContent  = '';
  btnText.innerHTML    = '<span class="dots"><span></span><span></span><span></span></span>';
  setStatus('Connecting…', 'active');

  if (typeof LivekitClient === 'undefined') {
    showError('LiveKit SDK not loaded. Please refresh and try again.');
    setStatus('Error', 'error');
    btnConnect.className = 'btn-connect idle';
    btnIcon.textContent  = '🎙️';
    btnText.textContent  = 'Talk to Jericho';
    return;
  }

  try {
    room = new LivekitClient.Room({
      adaptiveStream: true,
      dynacast: true,
      audioCaptureDefaults: {
        echoCancellation: true,
        noiseSuppression: true,
        autoGainControl: true
      }
    });

    room.on(LivekitClient.RoomEvent.ParticipantConnected, function(p) {
      if (p.identity !== 'lloyd') {
        setStatus('Jericho is here', 'success');
        clearError();
      }
    });

    room.on(LivekitClient.RoomEvent.ParticipantDisconnected, function(p) {
      if (p.identity !== 'lloyd') {
        setStatus('Jericho stepped away', '');
        setAvatar('');
      }
    });

    room.on(LivekitClient.RoomEvent.TrackSubscribed, function(track) {
      if (track.kind === LivekitClient.Track.Kind.Audio) {
        var el = track.attach();
        el.setAttribute('playsinline', '');
        el.setAttribute('autoplay', '');
        el.style.display = 'none';
        document.body.appendChild(el);
        // Force play — required on iOS Safari
        el.play().catch(function() {});
      }
    });

    room.on(LivekitClient.RoomEvent.TrackUnsubscribed, function(track) {
      track.detach();
      setAvatar('');
    });

    room.on(LivekitClient.RoomEvent.ActiveSpeakersChanged, function(speakers) {
      var agentTalking = speakers.some(function(s) { return s.identity !== 'lloyd'; });
      var lloydTalking = speakers.some(function(s) { return s.identity === 'lloyd'; });
      if (agentTalking)       { setAvatar('speaking'); }
      else if (lloydTalking)  { setAvatar('listening'); }
      else                    { setAvatar(''); }
    });

    room.on(LivekitClient.RoomEvent.Disconnected, function() { onDisconnected(); });

    room.on(LivekitClient.RoomEvent.ConnectionStateChanged, function(state) {
      if (state === LivekitClient.ConnectionState.Reconnecting) {
        setStatus('Reconnecting…', 'active');
      }
    });

    // Connect and enable mic as a promise chain
    room.connect(LIVEKIT_URL, TOKEN)
      .then(function() {
        return room.localParticipant.setMicrophoneEnabled(true);
      })
      .then(function() {
        connected = true;
        // Unlock audio on iOS Safari — must be called in user gesture context
        if (room.startAudio) { room.startAudio(); }
        btnConnect.className = 'btn-connect connected';
        btnIcon.textContent  = '✕';
        btnText.textContent  = 'End Session';
        showMute(true);
        setStatus('Connected — speak naturally', 'success');
        setAvatar('listening');

        // If no agent joins in 12 seconds, show helpful message
        setTimeout(function() {
          if (!connected) return;
          var hasAgent = false;
          room.remoteParticipants.forEach(function() { hasAgent = true; });
          if (!hasAgent) {
            setStatus('Waiting for Jericho…', 'active');
            showError('Jericho is starting up. Wait a moment, then try ending and reconnecting.');
          }
        }, 12000);
      })
      .catch(function(err) {
        var msg = err && err.message ? err.message : String(err);
        showError('Connection failed: ' + msg);
        setStatus('Connection failed', 'error');
        btnConnect.className = 'btn-connect idle';
        btnIcon.textContent  = '🎙️';
        btnText.textContent  = 'Talk to Jericho';
        room = null;
      });

  } catch(err) {
    var msg = err && err.message ? err.message : String(err);
    showError('Error: ' + msg);
    setStatus('Error', 'error');
    btnConnect.className = 'btn-connect idle';
    btnIcon.textContent  = '🎙️';
    btnText.textContent  = 'Talk to Jericho';
    room = null;
  }
}

function doDisconnect() {
  if (room) {
    try { room.disconnect(); } catch(e) {}
  }
  onDisconnected();
}

function onDisconnected() {
  connected = false; room = null; muted = false;
  btnConnect.className = 'btn-connect idle';
  btnIcon.textContent  = '🎙️';
  btnText.textContent  = 'Talk to Jericho';
  showMute(false);
  setStatus('Session ended', '');
  setAvatar('');
  clearError();
  document.querySelectorAll('audio').forEach(function(a) { a.remove(); });
}

function toggleMute() {
  if (!room || !connected) return;
  muted = !muted;
  room.localParticipant.setMicrophoneEnabled(!muted);
  [btnMute, btnMute2].forEach(function(b) {
    b.textContent = muted ? '🔇' : '🎤';
    b.className = b.className.replace(' muted', '') + (muted ? ' muted' : '');
  });
  setStatus(muted ? 'Microphone muted' : 'Microphone on', muted ? '' : 'active');
}

// Use addEventListener instead of inline onclick
btnConnect.addEventListener('click', function() { doConnect(); });
btnConnect.addEventListener('touchend', function(e) { e.preventDefault(); doConnect(); });
btnMute.addEventListener('click', function() { toggleMute(); });
btnMute.addEventListener('touchend', function(e) { e.preventDefault(); toggleMute(); });
btnMute2.addEventListener('click', function() { toggleMute(); });
btnMute2.addEventListener('touchend', function(e) { e.preventDefault(); toggleMute(); });
</script>
</body>
</html>
