<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Jericho" />
  <meta name="theme-color" content="#080810" />
  <title>Jericho — Personal</title>
  <link rel="icon" href="https://jarvis3rd.github.io/JERICHO-AI/icons/icon-192.png" />
  <link rel="apple-touch-icon" href="https://jarvis3rd.github.io/JERICHO-AI/icons/icon-192.png" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold:   #c8960c;
      --gold2:  #e8b820;
      --dark:   #080810;
      --dark2:  #0d0d1a;
      --dark3:  #13131f;
    }

    html, body {
      height: 100%; width: 100%;
      background: var(--dark);
      color: #e0e0e8;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      overflow: hidden;
      user-select: none;
      -webkit-user-select: none;
    }

    /* ── BACKGROUND GLOW ── */
    .bg-glow {
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background:
        radial-gradient(ellipse 60% 50% at 50% 30%, rgba(200,150,12,0.07) 0%, transparent 70%),
        radial-gradient(ellipse 40% 40% at 50% 80%, rgba(74,158,255,0.04) 0%, transparent 60%);
    }

    /* ── MAIN LAYOUT ── */
    .screen {
      position: fixed; inset: 0; z-index: 1;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: env(safe-area-inset-top, 20px) 24px env(safe-area-inset-bottom, 20px);
      gap: 0;
    }

    /* ── HEADER ── */
    .header {
      position: fixed; top: 0; left: 0; right: 0; z-index: 10;
      padding: env(safe-area-inset-top, 0) 20px 0;
      display: flex; justify-content: space-between; align-items: center;
      height: calc(52px + env(safe-area-inset-top, 0));
      background: linear-gradient(to bottom, rgba(8,8,16,0.95), transparent);
    }
    .header-logo {
      font-size: 0.65rem; font-weight: 700; letter-spacing: 3px;
      text-transform: uppercase; color: var(--gold); opacity: 0.8;
    }
    .header-badge {
      font-size: 0.6rem; font-weight: 700; letter-spacing: 2px;
      text-transform: uppercase; color: #3a3a4a;
      border: 1px solid #2a2a3a; padding: 3px 10px; border-radius: 20px;
    }

    /* ── AVATAR AREA ── */
    .avatar-zone {
      display: flex; flex-direction: column; align-items: center;
      margin-bottom: 40px;
    }

    .avatar-ring {
      position: relative;
      width: 140px; height: 140px;
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 24px;
    }

    /* Outer animated ring */
    .avatar-ring::before, .avatar-ring::after {
      content: '';
      position: absolute; border-radius: 50%;
      border: 1px solid rgba(200,150,12,0.25);
      animation: ring-pulse 3s ease-in-out infinite;
    }
    .avatar-ring::before { inset: -16px; animation-delay: 0s; }
    .avatar-ring::after  { inset: -32px; animation-delay: 0.8s; opacity: 0.5; }

    @keyframes ring-pulse {
      0%, 100% { transform: scale(1);    opacity: 0.3; }
      50%       { transform: scale(1.04); opacity: 0.7; }
    }

    /* Active speaking rings */
    .avatar-ring.speaking::before { animation: ring-speak 0.8s ease-in-out infinite; border-color: rgba(200,150,12,0.6); }
    .avatar-ring.speaking::after  { animation: ring-speak 0.8s ease-in-out infinite 0.2s; border-color: rgba(200,150,12,0.4); }
    @keyframes ring-speak {
      0%, 100% { transform: scale(1);    opacity: 0.5; }
      50%       { transform: scale(1.08); opacity: 1; }
    }

    .avatar-ring.listening::before { animation: ring-listen 1.2s ease-in-out infinite; border-color: rgba(74,158,255,0.5); }
    .avatar-ring.listening::after  { animation: ring-listen 1.2s ease-in-out infinite 0.3s; border-color: rgba(74,158,255,0.3); }
    @keyframes ring-listen {
      0%, 100% { transform: scale(1);    opacity: 0.4; }
      50%       { transform: scale(1.06); opacity: 0.8; }
    }

    .avatar-img {
      width: 100px; height: 100px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid rgba(200,150,12,0.5);
      box-shadow: 0 0 30px rgba(200,150,12,0.2), 0 8px 32px rgba(0,0,0,0.6);
      z-index: 1; position: relative;
      transition: border-color 0.3s;
    }
    .avatar-ring.speaking .avatar-img  { border-color: rgba(200,150,12,0.9); box-shadow: 0 0 40px rgba(200,150,12,0.4), 0 8px 32px rgba(0,0,0,0.6); }
    .avatar-ring.listening .avatar-img { border-color: rgba(74,158,255,0.7); box-shadow: 0 0 30px rgba(74,158,255,0.3), 0 8px 32px rgba(0,0,0,0.6); }

    .avatar-name {
      font-size: 1.5rem; font-weight: 300; letter-spacing: 5px;
      text-transform: uppercase; color: #fff; margin-bottom: 4px;
    }
    .avatar-title {
      font-size: 0.7rem; font-weight: 600; letter-spacing: 3px;
      text-transform: uppercase; color: var(--gold); opacity: 0.8;
    }

    /* ── STATUS TEXT ── */
    .status-text {
      font-size: 0.78rem; letter-spacing: 1px; color: #666;
      min-height: 20px; text-align: center;
      transition: color 0.3s;
      margin-top: 20px;
    }
    .status-text.active  { color: #aaa; }
    .status-text.error   { color: #f87161; }
    .status-text.success { color: #50c878; }

    /* ── TRANSCRIPT ── */
    .transcript {
      width: 100%; max-width: 360px;
      min-height: 60px; max-height: 100px;
      overflow-y: auto;
      text-align: center;
      font-size: 0.85rem; line-height: 1.6; color: #bbb;
      padding: 0 8px;
      margin-top: 16px;
    }
    .transcript::-webkit-scrollbar { display: none; }

    /* ── CONTROLS ── */
    .controls {
      position: fixed; bottom: 0; left: 0; right: 0;
      padding: 20px 24px env(safe-area-inset-bottom, 20px);
      background: linear-gradient(to top, rgba(8,8,16,0.98) 60%, transparent);
      display: flex; flex-direction: column; align-items: center; gap: 16px;
    }

    /* Connect button */
    .btn-connect {
      width: min(280px, 80vw);
      height: 56px;
      border-radius: 100px;
      border: none; cursor: pointer;
      font-size: 0.85rem; font-weight: 700; letter-spacing: 2px;
      text-transform: uppercase;
      display: flex; align-items: center; justify-content: center; gap: 10px;
      transition: opacity 0.2s, transform 0.15s, box-shadow 0.2s;
      outline: none;
    }
    .btn-connect:active { transform: scale(0.97); }

    .btn-connect.idle {
      background: linear-gradient(135deg, #c8960c, #a07008);
      color: #080810;
      box-shadow: 0 0 24px rgba(200,150,12,0.35), 0 4px 16px rgba(0,0,0,0.5);
    }
    .btn-connect.idle:hover { opacity: 0.9; box-shadow: 0 0 36px rgba(200,150,12,0.5), 0 4px 20px rgba(0,0,0,0.5); }

    .btn-connect.connected {
      background: rgba(248,113,97,0.15);
      color: #f87161;
      border: 1px solid rgba(248,113,97,0.4);
      box-shadow: none;
    }
    .btn-connect.connecting {
      background: rgba(200,150,12,0.1);
      color: var(--gold);
      border: 1px solid rgba(200,150,12,0.3);
      pointer-events: none;
    }

    /* Mute button */
    .btn-mute {
      width: 48px; height: 48px; border-radius: 50%;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      color: #888; font-size: 1.1rem;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: background 0.2s, color 0.2s;
      outline: none;
    }
    .btn-mute.muted { background: rgba(248,113,97,0.15); color: #f87161; border-color: rgba(248,113,97,0.3); }
    .btn-mute:active { transform: scale(0.95); }

    .controls-row { display: flex; align-items: center; gap: 16px; }

    /* ── CONNECTING DOTS ── */
    .dots { display: inline-flex; gap: 4px; align-items: center; }
    .dots span {
      width: 5px; height: 5px; border-radius: 50%;
      background: var(--gold); opacity: 0.5;
      animation: dot-bounce 1.2s ease-in-out infinite;
    }
    .dots span:nth-child(2) { animation-delay: 0.2s; }
    .dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes dot-bounce { 0%,100%{opacity:0.2;transform:translateY(0)} 50%{opacity:1;transform:translateY(-3px)} }
  </style>
</head>
<body>

<div class="bg-glow"></div>

<!-- Header -->
<div class="header">
  <div class="header-logo">Aperture Automations</div>
  <div class="header-badge">Personal</div>
</div>

<!-- Main screen -->
<div class="screen">

  <div class="avatar-zone">
    <div class="avatar-ring" id="avatarRing">
      <img
        class="avatar-img"
        id="avatarImg"
        src="https://jarvis3rd.github.io/JERICHO-AI/icons/icon-192.png"
        alt="Jericho"
      />
    </div>
    <div class="avatar-name">Jericho</div>
    <div class="avatar-title">Personal AI Assistant</div>
  </div>

  <div class="status-text" id="statusText">Ready to connect</div>
  <div class="transcript" id="transcript"></div>

</div>

<!-- Controls -->
<div class="controls">
  <div class="controls-row">
    <button class="btn-mute" id="btnMute" onclick="toggleMute()" title="Mute microphone" style="display:none">🎤</button>
    <button class="btn-connect idle" id="btnConnect" onclick="toggleConnect()">
      <span id="btnIcon">🎙️</span>
      <span id="btnText">Talk to Jericho</span>
    </button>
    <button class="btn-mute" id="btnMute2" onclick="toggleMute()" title="Mute microphone" style="display:none">🎤</button>
  </div>
</div>

<!-- LiveKit client SDK -->
<script src="https://cdn.jsdelivr.net/npm/livekit-client@2/dist/livekit-client.umd.min.js"></script>

<script>
(function() {
  // ── CONFIG ──────────────────────────────────────────
  var LIVEKIT_URL = 'wss://jerichoagent-uluhqyve.livekit.cloud';
  var TOKEN       = 'eyJ0eXAiOiJKV1QiLCJhbGciOiJIUzI1NiJ9.eyJpc3MiOiJBUEk0UU5BWlNxcXh0ZmUiLCJzdWIiOiJsbG95ZCIsIm5hbWUiOiJMbG95ZCIsIm5iZiI6MTc3NDIxOTk3MSwiZXhwIjoxODA1NzU1OTcxLCJ2aWRlbyI6eyJyb29tIjoibGxveWQtcGVyc29uYWwiLCJyb29tSm9pbiI6dHJ1ZSwiY2FuUHVibGlzaCI6dHJ1ZSwiY2FuU3Vic2NyaWJlIjp0cnVlLCJjYW5QdWJsaXNoRGF0YSI6dHJ1ZSwiYWdlbnQiOmZhbHNlfSwibWV0YWRhdGEiOiIifQ.Jxsd0G0nTaV06N-zF7tUKC1p2U9yPja8L7k4BrbV48Y';

  // ── STATE ────────────────────────────────────────────
  var room     = null;
  var muted    = false;
  var connected = false;

  // ── ELEMENTS ─────────────────────────────────────────
  var btnConnect  = document.getElementById('btnConnect');
  var btnMute     = document.getElementById('btnMute');
  var btnMute2    = document.getElementById('btnMute2');
  var btnIcon     = document.getElementById('btnIcon');
  var btnText     = document.getElementById('btnText');
  var statusEl    = document.getElementById('statusText');
  var transcriptEl= document.getElementById('transcript');
  var avatarRing  = document.getElementById('avatarRing');

  // ── HELPERS ──────────────────────────────────────────
  function setStatus(text, cls) {
    statusEl.textContent = text;
    statusEl.className = 'status-text' + (cls ? ' ' + cls : '');
  }

  function setTranscript(text) {
    transcriptEl.textContent = text;
  }

  function showMuteButtons(show) {
    btnMute.style.display  = show ? 'flex' : 'none';
    btnMute2.style.display = show ? 'flex' : 'none';
  }

  function setAvatarState(state) {
    avatarRing.className = 'avatar-ring' + (state ? ' ' + state : '');
  }

  // ── CONNECT ──────────────────────────────────────────
  window.toggleConnect = async function() {
    if (connected) {
      await disconnect();
    } else {
      await connect();
    }
  };

  async function connect() {
    btnConnect.className = 'btn-connect connecting';
    btnIcon.textContent  = '';
    btnText.innerHTML    = '<span class="dots"><span></span><span></span><span></span></span>';
    setStatus('Connecting to Jericho…', 'active');

    try {
      room = new LivekitClient.Room({
        adaptiveStream: true,
        dynacast: true,
        audioCaptureDefaults: {
          echoCancellation: true,
          noiseSuppression: true,
          autoGainControl: true,
        },
      });

      // ── Room events ──
      room.on(LivekitClient.RoomEvent.ParticipantConnected, function(participant) {
        if (participant.identity && participant.identity !== 'lloyd') {
          setStatus('Jericho is online', 'success');
          setAvatarState('');
        }
      });

      room.on(LivekitClient.RoomEvent.ParticipantDisconnected, function(participant) {
        if (participant.identity && participant.identity !== 'lloyd') {
          setStatus('Jericho disconnected', '');
          setAvatarState('');
        }
      });

      room.on(LivekitClient.RoomEvent.TrackSubscribed, function(track, pub, participant) {
        if (track.kind === LivekitClient.Track.Kind.Audio) {
          var el = track.attach();
          el.style.display = 'none';
          document.body.appendChild(el);
          setAvatarState('speaking');
          track.on(LivekitClient.TrackEvent.AudioPlaybackStarted, function() {
            setAvatarState('speaking');
          });
        }
      });

      room.on(LivekitClient.RoomEvent.TrackUnsubscribed, function(track) {
        track.detach();
        setAvatarState('');
      });

      room.on(LivekitClient.RoomEvent.ActiveSpeakersChanged, function(speakers) {
        var agentSpeaking = speakers.some(function(s) { return s.identity !== 'lloyd'; });
        var lloydSpeaking = speakers.some(function(s) { return s.identity === 'lloyd'; });
        if (agentSpeaking) {
          setAvatarState('speaking');
        } else if (lloydSpeaking) {
          setAvatarState('listening');
        } else {
          setAvatarState('');
        }
      });

      room.on(LivekitClient.RoomEvent.DataReceived, function(data, participant) {
        try {
          var msg = JSON.parse(new TextDecoder().decode(data));
          if (msg.type === 'transcript' || msg.text) {
            setTranscript(msg.text || msg.transcript || '');
          }
        } catch(e) {}
      });

      room.on(LivekitClient.RoomEvent.Disconnected, function() {
        onDisconnected();
      });

      room.on(LivekitClient.RoomEvent.ConnectionStateChanged, function(state) {
        if (state === LivekitClient.ConnectionState.Reconnecting) {
          setStatus('Reconnecting…', 'active');
        }
      });

      // ── Connect ──
      await room.connect(LIVEKIT_URL, TOKEN);
      await room.localParticipant.setMicrophoneEnabled(true);

      connected = true;
      btnConnect.className = 'btn-connect connected';
      btnIcon.textContent  = '✕';
      btnText.textContent  = 'End Session';
      showMuteButtons(true);
      setStatus('Connected — speak to Jericho', 'success');
      setAvatarState('listening');

    } catch(err) {
      console.error('Connection error:', err);
      setStatus('Connection failed — tap to retry', 'error');
      btnConnect.className = 'btn-connect idle';
      btnIcon.textContent  = '🎙️';
      btnText.textContent  = 'Talk to Jericho';
      room = null;
    }
  }

  async function disconnect() {
    if (room) {
      await room.disconnect();
    }
    onDisconnected();
  }

  function onDisconnected() {
    connected = false;
    room = null;
    btnConnect.className = 'btn-connect idle';
    btnIcon.textContent  = '🎙️';
    btnText.textContent  = 'Talk to Jericho';
    showMuteButtons(false);
    setStatus('Session ended', '');
    setAvatarState('');
    setTranscript('');
    // Remove any attached audio elements
    document.querySelectorAll('audio').forEach(function(a) { a.remove(); });
  }

  // ── MUTE ─────────────────────────────────────────────
  window.toggleMute = function() {
    if (!room || !connected) return;
    muted = !muted;
    room.localParticipant.setMicrophoneEnabled(!muted);
    [btnMute, btnMute2].forEach(function(b) {
      b.textContent = muted ? '🔇' : '🎤';
      b.className   = 'btn-mute' + (muted ? ' muted' : '');
    });
    setStatus(muted ? 'Microphone muted' : 'Microphone active', muted ? '' : 'active');
  };

})();
</script>

</body>
</html>
