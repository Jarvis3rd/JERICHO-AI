<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>JERICHO — Personal AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/livekit-client@2.5.3/dist/livekit-client.umd.min.js"></script>
  <style>
    :root {
      --bg: #04060e;
      --surface: #090c1a;
      --border: rgba(255,255,255,0.06);
      --accent: #00d4ff;
      --gold: #e8b84b;
      --gold-dim: rgba(232,184,75,0.4);
      --text: #e8ecf5;
      --muted: #6a7290;
      --danger: #ff4f4f;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      position: relative;
    }

    /* ── GRID ── */
    .grid-bg {
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(0,212,255,0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,212,255,0.02) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none; z-index: 0;
    }

    /* ── AMBIENT GLOW ── */
    .ambient {
      position: fixed; top: 50%; left: 50%;
      transform: translate(-50%, -55%);
      width: 500px; height: 500px;
      background: radial-gradient(ellipse, rgba(0,212,255,0.055) 0%, transparent 68%);
      pointer-events: none; z-index: 0;
      transition: background 0.8s ease;
    }
    .ambient.speaking {
      background: radial-gradient(ellipse, rgba(0,212,255,0.13) 0%, rgba(232,184,75,0.04) 50%, transparent 70%);
    }

    /* ── NOISE ── */
    body::before {
      content: ''; position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.035'/%3E%3C/svg%3E");
      pointer-events: none; z-index: 999; opacity: 0.3;
    }

    /* ── CARD ── */
    .card {
      position: relative; z-index: 1;
      display: flex; flex-direction: column;
      align-items: center; gap: 0;
      width: 100%; max-width: 400px;
      padding: 0 2rem;
    }

    /* ── WORDMARK ── */
    .wordmark {
      font-family: 'Syne', sans-serif; font-weight: 800;
      font-size: 0.68rem; letter-spacing: 0.38em; text-transform: uppercase;
      color: var(--muted); margin-bottom: 2.5rem;
      opacity: 0; animation: fadeUp 0.6s 0.1s ease forwards;
    }
    .wordmark span { color: var(--accent); }

    /* ── AVATAR WRAP ── */
    .avatar-wrap {
      position: relative;
      width: 210px; height: 230px;
      margin-bottom: 2.2rem;
      opacity: 0; animation: fadeUp 0.8s 0.3s ease forwards;
      display: flex; align-items: center; justify-content: center;
    }

    /* Orbital rings — centered on face mass (not ears) */
    .ring {
      position: absolute;
      border-radius: 50%;
      pointer-events: none;
      top: 16px; /* offset down past ears */
    }
    .ring-1 {
      width: 224px; height: 224px;
      left: 50%; transform: translateX(-50%);
      border: 1px solid rgba(0,212,255,0.1);
      transition: border-color 0.5s;
    }
    .ring-2 {
      width: 248px; height: 248px;
      left: 50%; transform: translateX(-50%);
      border: 1px solid rgba(0,212,255,0.05);
      transition: border-color 0.5s;
    }
    .ring.active { border-color: rgba(0,212,255,0.35) !important; }
    .ring-2.active { border-color: rgba(232,184,75,0.12) !important; }

    /* Scan pulse ring */
    .scan-ring {
      position: absolute;
      width: 224px; height: 224px;
      left: 50%; transform: translateX(-50%);
      top: 16px;
      border-radius: 50%;
      border: 1px solid var(--accent);
      opacity: 0; pointer-events: none;
    }
    .scan-ring.animate {
      animation: scanPulse 1.6s ease-out infinite;
    }

    @keyframes scanPulse {
      0%   { transform: translateX(-50%) scale(1);   opacity: 0.5; }
      100% { transform: translateX(-50%) scale(1.25); opacity: 0; }
    }

    /* ── MASK SVG ── */
    .mask-svg {
      width: 210px; height: 230px;
      overflow: visible;
      filter: drop-shadow(0 8px 32px rgba(0,0,0,0.7));
    }

    /* Eye slits — base state */
    .eye-slit {
      transition: opacity 0.3s;
    }

    /* Speaking: pulse glow */
    @keyframes eyePulse {
      0%, 100% { opacity: 0.88; }
      50%       { opacity: 1;    }
    }
    .eye-slit.speaking { animation: eyePulse 0.7s ease-in-out infinite; }

    /* Gold trim pulse when speaking */
    @keyframes goldPulse {
      0%, 100% { opacity: 0.55; }
      50%       { opacity: 0.95; }
    }
    .gold-trim { transition: opacity 0.4s; }
    .gold-trim.speaking { animation: goldPulse 1.1s ease-in-out infinite; }

    /* Connecting: dim eyes that brighten */
    @keyframes eyeBoot {
      0%   { opacity: 0.1; }
      60%  { opacity: 0.7; }
      100% { opacity: 0.88; }
    }
    .eye-slit.booting { animation: eyeBoot 1.2s ease forwards; }

    /* ── STATUS ── */
    .status-wrap {
      display: flex; align-items: center; gap: 0.55rem;
      margin-bottom: 2.5rem; min-height: 26px;
      opacity: 0; animation: fadeUp 0.6s 0.5s ease forwards;
    }
    .status-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--muted); flex-shrink: 0;
      transition: background 0.3s, box-shadow 0.3s;
    }
    .status-dot.connected  { background: var(--accent); box-shadow: 0 0 8px rgba(0,212,255,0.6); }
    .status-dot.listening  { background: var(--accent); box-shadow: 0 0 8px rgba(0,212,255,0.6); animation: breathe 2s infinite; }
    .status-dot.speaking   { background: var(--gold);   box-shadow: 0 0 12px rgba(232,184,75,0.9); }
    .status-dot.error      { background: var(--danger); }
    .status-text {
      font-family: 'Syne', sans-serif; font-size: 0.7rem;
      font-weight: 600; letter-spacing: 0.18em; text-transform: uppercase;
      color: var(--muted); transition: color 0.3s;
    }
    .status-text.active { color: var(--accent); }
    .status-text.gold   { color: var(--gold); }

    /* ── BUTTONS ── */
    .btn-connect {
      font-family: 'Syne', sans-serif; font-size: 0.8rem;
      font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase;
      padding: 1rem 3rem; background: var(--accent); color: var(--bg);
      border: none; cursor: pointer; position: relative;
      transition: transform 0.2s, box-shadow 0.2s, opacity 0.3s;
      box-shadow: 0 0 30px rgba(0,212,255,0.3);
      opacity: 0; animation: fadeUp 0.6s 0.7s ease forwards;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-connect:hover  { transform: translateY(-2px); box-shadow: 0 0 50px rgba(0,212,255,0.5); }
    .btn-connect:active { transform: translateY(0); }
    .btn-connect:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    .btn-disconnect {
      font-family: 'Syne', sans-serif; font-size: 0.72rem; font-weight: 600;
      letter-spacing: 0.14em; text-transform: uppercase;
      padding: 0.65rem 2rem; background: transparent;
      color: var(--muted); border: 1px solid var(--border);
      cursor: pointer; margin-top: 1rem;
      transition: border-color 0.2s, color 0.2s; display: none;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-disconnect:hover { border-color: var(--danger); color: var(--danger); }

    /* ── WAVEFORM ── */
    .waveform {
      display: none; gap: 3px; align-items: flex-end;
      height: 22px; margin-top: 1.2rem;
    }
    .waveform .bar {
      width: 3px; background: var(--accent); border-radius: 2px;
      opacity: 0.4; height: 4px; transition: height 0.1s;
    }

    /* ── ANIMS ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes breathe {
      0%,100% { opacity: 1; } 50% { opacity: 0.35; }
    }

    @media (max-width: 380px) {
      .avatar-wrap { width: 180px; height: 198px; }
      .mask-svg { width: 180px; height: 198px; }
    }
  </style>
</head>
<body>

<div class="grid-bg"></div>
<div class="ambient" id="ambient"></div>

<div class="card">

  <p class="wordmark"><span>APERTURE</span> AUTOMATIONS</p>

  <!-- Avatar -->
  <div class="avatar-wrap" id="avatarWrap">
    <div class="ring ring-1" id="ring1"></div>
    <div class="ring ring-2" id="ring2"></div>
    <div class="scan-ring" id="scanRing"></div>

    <svg class="mask-svg" viewBox="0 0 210 230" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <!-- Blue eye glow -->
        <filter id="eyeGlow" x="-80%" y="-200%" width="260%" height="500%">
          <feGaussianBlur in="SourceGraphic" stdDeviation="3.5" result="b1"/>
          <feGaussianBlur in="SourceGraphic" stdDeviation="1.5" result="b2"/>
          <feMerge><feMergeNode in="b1"/><feMergeNode in="b2"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <!-- Intense glow (speaking) -->
        <filter id="eyeGlowX" x="-120%" y="-300%" width="340%" height="700%">
          <feGaussianBlur in="SourceGraphic" stdDeviation="7" result="b1"/>
          <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="b2"/>
          <feMerge><feMergeNode in="b1"/><feMergeNode in="b1"/><feMergeNode in="b2"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <!-- Gold glow -->
        <filter id="goldGlow" x="-50%" y="-50%" width="200%" height="200%">
          <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="bg"/>
          <feMerge><feMergeNode in="bg"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <!-- Face gradient -->
        <radialGradient id="faceGrad" cx="50%" cy="32%" r="62%">
          <stop offset="0%" stop-color="#141828"/>
          <stop offset="55%" stop-color="#080b16"/>
          <stop offset="100%" stop-color="#050710"/>
        </radialGradient>
        <!-- Panel sheen -->
        <linearGradient id="foreheadGrad" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#1c2240" stop-opacity="0.8"/>
          <stop offset="100%" stop-color="#080b16" stop-opacity="0"/>
        </linearGradient>
        <!-- Clip to face shape -->
        <clipPath id="faceClip">
          <path d="M83,6 L67,2 L46,4 L28,22 L14,50 L10,88 L10,130 L16,160 L38,182 L62,196 L105,202 L148,196 L172,182 L194,160 L200,130 L200,88 L196,50 L182,22 L164,4 L143,2 L127,6 Q105,3 83,6 Z"/>
        </clipPath>
      </defs>

      <!-- ── FACE BASE ── -->
      <path id="faceMask"
        d="M83,6 L67,2 L46,4 L28,22 L14,50 L10,88 L10,130 L16,160 L38,182 L62,196 L105,202 L148,196 L172,182 L194,160 L200,130 L200,88 L196,50 L182,22 L164,4 L143,2 L127,6 Q105,3 83,6 Z"
        fill="url(#faceGrad)"/>

      <!-- ── FOREHEAD PANEL SHEEN ── -->
      <path d="M83,6 L67,2 L46,4 L28,22 L14,50 L60,50 L105,45 L150,50 L196,50 L182,22 L164,4 L143,2 L127,6 Q105,3 83,6 Z"
        fill="url(#foreheadGrad)" opacity="0.6"/>

      <!-- ── SURFACE PANEL LINES (subtle dark etching) ── -->
      <!-- Center forehead divide -->
      <line x1="105" y1="10" x2="105" y2="68" stroke="#ffffff" stroke-width="0.4" opacity="0.06"/>
      <!-- Left upper panel -->
      <line x1="52" y1="48" x2="96" y2="70" stroke="#ffffff" stroke-width="0.4" opacity="0.05"/>
      <!-- Right upper panel -->
      <line x1="158" y1="48" x2="114" y2="70" stroke="#ffffff" stroke-width="0.4" opacity="0.05"/>
      <!-- Lower face panel lines -->
      <line x1="38" y1="145" x2="80" y2="158" stroke="#ffffff" stroke-width="0.4" opacity="0.04"/>
      <line x1="172" y1="145" x2="130" y2="158" stroke="#ffffff" stroke-width="0.4" opacity="0.04"/>

      <!-- ── EAR TRIM (GOLD) ── -->
      <!-- Left ear outer edge -->
      <path d="M83,6 L67,2 L46,4 L28,22" fill="none"
        stroke="var(--gold)" stroke-width="1.8" opacity="0.75" filter="url(#goldGlow)"
        class="gold-trim" id="goldTrimLeft"/>
      <!-- Right ear outer edge -->
      <path d="M127,6 L143,2 L164,4 L182,22" fill="none"
        stroke="var(--gold)" stroke-width="1.8" opacity="0.75" filter="url(#goldGlow)"
        class="gold-trim" id="goldTrimRight"/>

      <!-- ── FOREHEAD ACCENT LINE (GOLD) ── -->
      <line x1="46" y1="50" x2="164" y2="50"
        stroke="var(--gold)" stroke-width="1" opacity="0.35"
        class="gold-trim"/>

      <!-- ── BROW RIDGE (GOLD) ── -->
      <!-- Left brow — angular slash pointing inward -->
      <path d="M22,90 L52,76 L96,82" fill="none"
        stroke="var(--gold)" stroke-width="2" stroke-linecap="round"
        opacity="0.7" filter="url(#goldGlow)"
        class="gold-trim" id="browLeft"/>
      <!-- Right brow -->
      <path d="M188,90 L158,76 L114,82" fill="none"
        stroke="var(--gold)" stroke-width="2" stroke-linecap="round"
        opacity="0.7" filter="url(#goldGlow)"
        class="gold-trim" id="browRight"/>

      <!-- ── EYE SOCKET DEPTH ── -->
      <ellipse cx="68" cy="104" rx="36" ry="15" fill="#030508" opacity="0.65"/>
      <ellipse cx="142" cy="104" rx="36" ry="15" fill="#030508" opacity="0.65"/>

      <!-- ── EYE SLITS ── -->
      <rect id="leftEye" class="eye-slit" x="35" y="97" width="66" height="13" rx="6.5"
        fill="var(--accent)" opacity="0.88" filter="url(#eyeGlow)"/>
      <rect id="rightEye" class="eye-slit" x="109" y="97" width="66" height="13" rx="6.5"
        fill="var(--accent)" opacity="0.88" filter="url(#eyeGlow)"/>

      <!-- Eye slit inner highlight (white core) -->
      <rect id="leftEyeCore" x="46" y="100" width="44" height="6" rx="3"
        fill="white" opacity="0.5"/>
      <rect id="rightEyeCore" x="120" y="100" width="44" height="6" rx="3"
        fill="white" opacity="0.5"/>

      <!-- ── CHEEK BLADE LINES (GOLD) ── -->
      <!-- Left cheek slash -->
      <path d="M14,118 L52,134" fill="none"
        stroke="var(--gold)" stroke-width="1.5" stroke-linecap="round"
        opacity="0.45" class="gold-trim"/>
      <!-- Right cheek slash -->
      <path d="M196,118 L158,134" fill="none"
        stroke="var(--gold)" stroke-width="1.5" stroke-linecap="round"
        opacity="0.45" class="gold-trim"/>

      <!-- ── NOSE BRIDGE (subtle) ── -->
      <path d="M96,115 L105,140 L114,115" fill="none"
        stroke="var(--gold)" stroke-width="1" stroke-linecap="round"
        opacity="0.2" class="gold-trim"/>

      <!-- ── CHIN ACCENT (GOLD) ── -->
      <path d="M68,186 L105,196 L142,186" fill="none"
        stroke="var(--gold)" stroke-width="2" stroke-linecap="round"
        opacity="0.55" filter="url(#goldGlow)"
        class="gold-trim" id="goldChin"/>

      <!-- ── CHIN SECONDARY LINE ── -->
      <line x1="80" y1="174" x2="130" y2="174"
        stroke="var(--gold)" stroke-width="0.8" opacity="0.25"
        class="gold-trim"/>

      <!-- ── OUTER FACE EDGE (thin accent) ── -->
      <path d="M83,6 L67,2 L46,4 L28,22 L14,50 L10,88 L10,130 L16,160 L38,182 L62,196 L105,202 L148,196 L172,182 L194,160 L200,130 L200,88 L196,50 L182,22 L164,4 L143,2 L127,6 Q105,3 83,6 Z"
        fill="none" stroke="rgba(0,212,255,0.08)" stroke-width="1"/>

    </svg>
  </div>

  <!-- Status -->
  <div class="status-wrap">
    <div class="status-dot" id="statusDot"></div>
    <span class="status-text" id="statusText">Standby</span>
  </div>

  <!-- Connect -->
  <button class="btn-connect" id="btnConnect" onclick="connect()">Activate Jericho</button>

  <!-- Waveform -->
  <div class="waveform" id="waveform">
    <div class="bar"></div><div class="bar"></div><div class="bar"></div>
    <div class="bar"></div><div class="bar"></div><div class="bar"></div>
    <div class="bar"></div><div class="bar"></div><div class="bar"></div>
  </div>

  <!-- Disconnect -->
  <button class="btn-disconnect" id="btnDisconnect" onclick="disconnect()">End Session</button>

</div>

<script>
  const RAILWAY_URL = 'https://jericho-ai-production.up.railway.app';
  const ROOM_NAME   = 'lloyd-personal';
  const IDENTITY    = 'lloyd';

  let room = null;
  let agentState = 'idle';

  // UI refs
  const statusDot     = document.getElementById('statusDot');
  const statusText    = document.getElementById('statusText');
  const btnConnect    = document.getElementById('btnConnect');
  const btnDisconnect = document.getElementById('btnDisconnect');
  const waveform      = document.getElementById('waveform');
  const ring1         = document.getElementById('ring1');
  const ring2         = document.getElementById('ring2');
  const scanRing      = document.getElementById('scanRing');
  const ambient       = document.getElementById('ambient');

  // Eyes
  const leftEye      = document.getElementById('leftEye');
  const rightEye     = document.getElementById('rightEye');
  const leftEyeCore  = document.getElementById('leftEyeCore');
  const rightEyeCore = document.getElementById('rightEyeCore');

  // Gold trim elements
  const goldTrimEls = document.querySelectorAll('.gold-trim');

  // ── STATE MACHINE ─────────────────────────────────────────────────────────

  function setState(s) {
    agentState = s;

    // Status dot
    statusDot.className = 'status-dot ' + ({
      connecting: '',
      connected:  'connected',
      listening:  'listening',
      speaking:   'speaking',
      error:      'error',
    }[s] || '');

    // Status text
    statusText.className = 'status-text' +
      (s === 'speaking' ? ' gold' : s !== 'idle' && s !== 'error' ? ' active' : '');
    statusText.textContent = {
      idle:       'Standby',
      connecting: 'Initializing…',
      connected:  'Connected',
      listening:  'Listening',
      speaking:   'Speaking',
      error:      'Connection failed',
    }[s] || 'Standby';

    // Rings
    const isActive = !['idle','error'].includes(s);
    ring1.classList.toggle('active', isActive);
    ring2.classList.toggle('active', isActive);
    scanRing.classList.toggle('animate', s === 'speaking');
    ambient.classList.toggle('speaking', s === 'speaking');

    // Buttons
    if (['idle','error'].includes(s)) {
      btnConnect.style.display    = 'block';
      btnConnect.disabled         = false;
      btnConnect.textContent      = s === 'error' ? 'Retry' : 'Activate Jericho';
      btnDisconnect.style.display = 'none';
      waveform.style.display      = 'none';
    } else if (s === 'connecting') {
      btnConnect.disabled   = true;
      btnConnect.textContent = 'Initializing…';
    } else {
      btnConnect.style.display    = 'none';
      btnDisconnect.style.display = 'block';
      waveform.style.display      = 'flex';
    }

    // Eyes
    updateEyes(s);

    // Gold trim
    goldTrimEls.forEach(el => el.classList.toggle('speaking', s === 'speaking'));

    // Waveform
    animateWaveform(s === 'speaking');
  }

  // ── EYES ──────────────────────────────────────────────────────────────────

  let blinkTimer = null;

  function setEyeScale(sy) {
    [leftEye, rightEye].forEach(el => {
      el.style.transform      = `scaleY(${sy})`;
      el.style.transformOrigin = '50% 50%';
    });
    [leftEyeCore, rightEyeCore].forEach(el => {
      el.style.transform      = `scaleY(${sy})`;
      el.style.transformOrigin = '50% 50%';
      el.style.opacity = sy < 0.3 ? '0' : '0.5';
    });
  }

  function blink() {
    setEyeScale(0.08);
    setTimeout(() => setEyeScale(1), 90);
  }

  function startBlink() {
    stopBlink();
    const schedule = () => {
      blinkTimer = setTimeout(() => {
        if (['connected','listening'].includes(agentState)) {
          blink();
          if (Math.random() < 0.18) setTimeout(blink, 210);
        }
        schedule();
      }, 2800 + Math.random() * 2400);
    };
    schedule();
  }

  function stopBlink() {
    clearTimeout(blinkTimer);
    setEyeScale(1);
  }

  function updateEyes(s) {
    // Clear all eye classes
    [leftEye, rightEye].forEach(el => {
      el.classList.remove('speaking', 'booting');
      el.setAttribute('filter', 'url(#eyeGlow)');
    });

    if (s === 'idle' || s === 'error') {
      stopBlink();
      setEyeScale(1);
      [leftEye, rightEye].forEach(el => el.style.opacity = '0.25');
      [leftEyeCore, rightEyeCore].forEach(el => el.style.opacity = '0.1');

    } else if (s === 'connecting') {
      stopBlink();
      [leftEye, rightEye].forEach(el => {
        el.style.opacity = '0.88';
        el.classList.add('booting');
      });
      [leftEyeCore, rightEyeCore].forEach(el => el.style.opacity = '0.5');

    } else if (s === 'connected' || s === 'listening') {
      [leftEye, rightEye].forEach(el => {
        el.style.opacity = '0.88';
      });
      [leftEyeCore, rightEyeCore].forEach(el => el.style.opacity = '0.5');
      startBlink();

    } else if (s === 'speaking') {
      stopBlink();
      setEyeScale(1);
      [leftEye, rightEye].forEach(el => {
        el.style.opacity = '1';
        el.classList.add('speaking');
        el.setAttribute('filter', 'url(#eyeGlowX)');
      });
      [leftEyeCore, rightEyeCore].forEach(el => el.style.opacity = '0.85');
    }
  }

  // ── WAVEFORM ──────────────────────────────────────────────────────────────

  let waveInt = null;
  const bars = waveform.querySelectorAll('.bar');

  function animateWaveform(on) {
    clearInterval(waveInt);
    if (on) {
      waveInt = setInterval(() => {
        bars.forEach(b => {
          const h = 2 + Math.random() * 18;
          b.style.height  = h + 'px';
          b.style.opacity = (0.25 + (h / 20) * 0.75).toFixed(2);
        });
      }, 90);
    } else {
      bars.forEach(b => { b.style.height = '4px'; b.style.opacity = '0.3'; });
    }
  }

  // ── CONNECTION ────────────────────────────────────────────────────────────

  async function connect() {
    setState('connecting');
    try {
      const res = await fetch(
        `${RAILWAY_URL}/token`,
        { signal: AbortSignal.timeout(10000) }
      );
      if (!res.ok) throw new Error(`Token server: ${res.status}`);
      const data = await res.json(); const token = data.token; const url = data.serverUrl;
      if (!token || !url) throw new Error('Invalid token response');

      room = new LivekitClient.Room({
        adaptiveStream: true,
        dynacast: true,
        audioCaptureDefaults: {
          autoGainControl: true,
          echoCancellation: true,
          noiseSuppression: true,
        },
      });

      room.on(LivekitClient.RoomEvent.Connected, async () => {
        setState('listening');
        await room.localParticipant.setMicrophoneEnabled(true);
      });

      room.on(LivekitClient.RoomEvent.Disconnected, () => {
        setState('idle'); room = null;
      });

      room.on(LivekitClient.RoomEvent.ActiveSpeakersChanged, (speakers) => {
        if (!room) return;
        const agentTalking = speakers.some(s => s.identity !== IDENTITY);
        if (agentTalking) setState('speaking');
        else if (agentState !== 'idle') setState('listening');
      });

      room.on(LivekitClient.RoomEvent.TrackSubscribed, (track) => {
        if (track.kind === LivekitClient.Track.Kind.Audio) {
          const el = track.attach();
          el.autoplay = true;
          document.body.appendChild(el);
        }
      });

      room.on(LivekitClient.RoomEvent.TrackUnsubscribed, (track) => {
        track.detach();
      });

      await room.connect(url, token);

    } catch (err) {
      console.error('Jericho connection error:', err);
      setState('error');
      statusText.textContent = err.message || 'Connection failed';
    }
  }

  async function disconnect() {
    if (room) { await room.disconnect(); room = null; }
    setState('idle');
  }

  // ── BOOT ──────────────────────────────────────────────────────────────────
  setState('idle');
</script>
