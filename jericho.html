<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JERICHO — AI Agent</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#c8960c">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="JERICHO">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;400;600;700&family=Share+Tech+Mono&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --gold: #c8960c;
      --blue: #4fc3f7;
      --dark: #050505;
    }

    body {
      background: var(--dark);
      color: #ccc;
      font-family: 'Rajdhani', sans-serif;
      min-height: 100vh;
      display: flex
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* ── FACE ── */
    #face-wrap {
      position: relative;
      width: min(380px, 88vw);
      /* maintain 1368x2000 aspect ratio */
      aspect-ratio: 1368 / 2000;
      flex-shrink: 0;
    }

    #jericho-img {
      width: 100%;
      height: 100%;
      object-fit: fill;
      display: block;
      border-radius: 4px;
    }

    /* ── EYE OVERLAYS ──
       Pixel analysis results:
         Left eye : x 10.7%–37.1%,  y 48.0%–56.0%
         Right eye: x 61.8%–87.5%,  y 47.9%–56.0%
       Using clip-path polygon to match the angular visor shape.
    ── */
    .eye-overlay {
      position: absolute;
      pointer-events: none;
      /* Angular visor shape: parallelogram with angled ends */
      clip-path: polygon(4% 0%, 100% 0%, 96% 100%, 0% 100%);
    }

    /* Left eye */
    #eye-left {
      left: 10.7%;
      top: 48.0%;
      width: 26.4%;   /* 37.1 - 10.7 */
      height: 8.0%;   /* 56.0 - 48.0 */
    }

    /* Right eye */
    #eye-right {
      left: 61.8%;
      top: 47.9%;
      width: 25.7%;   /* 87.5 - 61.8 */
      height: 8.1%;   /* 56.0 - 47.9 */
    }

    /* IDLE: barely-there glow */
    .eye-overlay.idle {
      animation: eye-idle 3s ease-in-out infinite;
    }
    @keyframes eye-idle {
      0%, 100% {
        background: rgba(79, 195, 247, 0.08);
        box-shadow: 0 0 8px 2px rgba(79,195,247,0.25),
                    0 0 20px 5px rgba(79,195,247,0.1);
      }
      50% {
        background: rgba(79, 195, 247, 0.18);
        box-shadow: 0 0 14px 4px rgba(79,195,247,0.45),
                    0 0 32px 10px rgba(79,195,247,0.15);
      }
    }

    /* LISTENING: steady medium glow */
    .eye-overlay.listening {
      animation: eye-listen 1.4s ease-in-out infinite;
    }
    @keyframes eye-listen {
      0%, 100% {
        background: rgba(79, 195, 247, 0.20);
        box-shadow: 0 0 12px 4px rgba(79,195,247,0.6),
                    0 0 28px 8px rgba(79,195,247,0.25);
      }
      50% {
        background: rgba(79, 195, 247, 0.35);
        box-shadow: 0 0 20px 7px rgba(79,195,247,0.8),
                    0 0 44px 14px rgba(79,195,247,0.35);
      }
    }

    /* SPEAKING: rapid intense flicker */
    .eye-overlay.speaking {
      animation: eye-speak 0.15s ease-in-out infinite alternate;
    }
    @keyframes eye-speak {
      from {
        background: rgba(79, 195, 247, 0.35);
        box-shadow:
          0 0 14px 5px rgba(79,195,247,0.85),
          0 0 36px 12px rgba(79,195,247,0.5),
          0 0 70px 24px rgba(79,195,247,0.2),
          inset 0 0 10px rgba(255,255,255,0.35);
      }
      to {
        background: rgba(140, 220, 255, 0.55);
        box-shadow:
          0 0 22px 8px rgba(79,195,247,1.0),
          0 0 56px 18px rgba(79,195,247,0.65),
          0 0 100px 35px rgba(79,195,247,0.25),
          inset 0 0 16px rgba(255,255,255,0.55);
      }
    }

    /* ── NAME PLATE ── */
    #nameplate {
      margin-top: 16px;
      text-align: center;
      letter-spacing: 0.35em;
    }
    #nameplate h1 {
      font-size: clamp(1.5rem, 5vw, 2.2rem);
      font-weight: 700;
      color: var(--gold);
      text-shadow: 0 0 14px rgba(200,150,12,0.5);
      line-height: 1;
    }
    #nameplate p {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.62rem;
      letter-spacing: 0.22em;
      color: #444;
      margin-top: 4px;
    }

    /* ── STATUS ── */
    #status-bar {
      display: flex; align-items: center; gap: 10px;
      margin-top: 12px;
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.7rem; letter-spacing: 0.1em; color: #444;
    }
    #status-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #2a2a2a; flex-shrink: 0;
      transition: background 0.3s, box-shadow 0.3s;
    }
    #status-dot.on   { background: #4fc3f7; box-shadow: 0 0 8px #4fc3f7; }
    #status-dot.talk { background: #69f0ae; box-shadow: 0 0 8px #69f0ae; animation: dp 0.4s alternate infinite; }
    @keyframes dp { to { transform: scale(1.5); } }
    #status-text { color: #555; transition: color 0.3s; }
    #status-text.live { color: #4fc3f7; }

    /* ── CONTROLS ── */
    #controls { display: flex; gap: 12px; margin-top: 14px; flex-wrap: wrap; justify-content: center; }
    button {
      font-family: 'Rajdhani', sans-serif; font-size: 0.82rem;
      font-weight: 600; letter-spacing: 0.15em;
      padding: 9px 22px; border-radius: 3px; border: 1px solid;
      cursor: pointer; text-transform: uppercase; transition: all 0.2s;
      background: transparent;
    }
    #btn-connect { border-color: var(--gold); color: var(--gold); }
    #btn-connect:hover { background: rgba(200,150,12,0.1); box-shadow: 0 0 12px rgba(200,150,12,0.3); }
    #btn-connect.disc { border-color: #ef5350; color: #ef5350; }
    #btn-connect.disc:hover { background: rgba(239,83,80,0.1); }

    /* ── MODAL ── */
    #modal-backdrop {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.88); z-index: 100;
      align-items: center; justify-content: center;
    }
    #modal-backdrop.open { display: flex; }
    #modal {
      background: #0c0c0c; border: 1px solid #1e1e1e;
      border-radius: 6px; padding: 26px 30px;
      width: min(370px, 92vw);
      box-shadow: 0 0 40px rgba(79,195,247,0.07);
    }
    #modal h2 { font-size: 1rem; font-weight: 700; letter-spacing: 0.2em; color: var(--gold); margin-bottom: 18px; text-transform: uppercase; }
    .field { margin-bottom: 12px; }
    .field label { display: block; font-family: 'Share Tech Mono', monospace; font-size: 0.65rem; letter-spacing: 0.12em; color: #4a4a4a; margin-bottom: 5px; }
    .field input {
      width: 100%; background: #111; border: 1px solid #252525;
      border-radius: 3px; color: #bbb;
      font-family: 'Share Tech Mono', monospace; font-size: 0.78rem;
      padding: 8px 11px; outline: none; transition: border-color 0.2s;
    }
    .field input:focus { border-color: var(--blue); }
    .modal-btns { display: flex; gap: 10px; margin-top: 20px; justify-content: flex-end; }
    #btn-cancel { border-color: #2a2a2a; color: #4a4a4a; }
    #btn-cancel:hover { border-color: #444; color: #777; }
    #btn-go { border-color: var(--blue); color: var(--blue); }
    #btn-go:hover { background: rgba(79,195,247,0.09); box-shadow: 0 0 12px rgba(79,195,247,0.2); }
    #err { font-family: 'Share Tech Mono', monospace; font-size: 0.68rem; color: #ef5350; margin-top: 8px; min-height: 14px; }
  </style>
</head>
<body>

  <div id="face-wrap">
    <img id="jericho-img" src="" alt="Jericho" />
    <div id="eye-left"  class="eye-overlay idle"></div>
    <div id="eye-right" class="eye-overlay idle"></div>
  </div>

  <div id="nameplate">
    <h1>JERICHO</h1>
    <p>AUTONOMOUS AI AGENT — v1.0</p>
  </div>

  <div id="status-bar">
    <div id="status-dot"></div>
    <span id="status-text">OFFLINE</span>
  </div>

  <div id="controls">
    <button id="btn-connect">Connect</button>
  </div>

  <div id="modal-backdrop">
    <div id="modal">
      <h2>Connect to Jericho</h2>
      <div class="field">
        <label>LiveKit URL</label>
        <input id="inp-url" type="text" placeholder="wss://your-project.livekit.cloud" />
      </div>
      <div class="field">
        <label>Room Token</label>
        <input id="inp-token" type="text" placeholder="eyJhbGci..." />
      </div>
      <div id="err"></div>
      <div class="modal-btns">
        <button id="btn-cancel">Cancel</button>
        <button id="btn-go">Connect</button>
      </div>
    </div>
  </div>

    const eyeL = document.getElementById('eye-left');
    const eyeR = document.getElementById('eye-right');
    const dot  = document.getElementById('status-dot');
    const txt  = document.getElementById('status-text');

    function eyes(state) {
      ['idle','listening','speaking'].forEach(s => {
        eyeL.classList.toggle(s, s === state);
        eyeR.classList.toggle(s, s === state);
      });
    }

    function status(label, mode) {
      txt.textContent = label;
      txt.className = mode === 'live' ? 'live' : '';
      dot.className = mode === 'speak' ? 'talk' : mode === 'live' ? 'on' : '';
    }

    eyes('idle'); status('OFFLINE', '');

    let room = null;

    async function connect(url, token) {
      try {
        room = new LivekitClient.Room();

        room.on(LivekitClient.RoomEvent.Connected, () => {
          eyes('listening'); status('CONNECTED', 'live');
        });

        room.on(LivekitClient.RoomEvent.ActiveSpeakersChanged, (speakers) => {
          const remote = speakers.some(p => !p.isLocal);
          if (remote) { eyes('speaking'); status('SPEAKING', 'speak'); }
          else if (room.state === 'connected') { eyes('listening'); status('LISTENING', 'live'); }
        });

        room.on(LivekitClient.RoomEvent.Disconnected, () => {
          eyes('idle'); status('OFFLINE', '');
          document.getElementById('btn-connect').textContent = 'Connect';
          document.getElementById('btn-connect').classList.remove('disc');
          room = null;
        });

        // Attach remote audio tracks to DOM so they actually play
        room.on(LivekitClient.RoomEvent.TrackSubscribed, (track, publication, participant) => {
          if (track.kind === LivekitClient.Track.Kind.Audio) {
            const audioEl = track.attach();
            audioEl.style.display = 'none';
            document.body.appendChild(audioEl);
          }
        });

        // Clean up audio elements when track is removed
        room.on(LivekitClient.RoomEvent.TrackUnsubscribed, (track) => {
          track.detach().forEach(el => el.remove());
        });

        await room.connect(url, token);
        // Unlock audio on mobile browsers (requires being inside a user gesture)
        await room.startAudio();
        await room.localParticipant.setMicrophoneEnabled(true);
        return null;
      } catch(e) { return e.message || 'Connection failed'; }
    }

    const SANDBOX_ID = 'jericho-agent-tokens-1gmma8';

    document.getElementById('btn-connect').addEventListener('click', async () => {
      if (room) { room.disconnect(); return; }
      const btn = document.getElementById('btn-connect');
      btn.textContent = 'Connecting…'; btn.disabled = true;
      try {
        const res = await fetch('https://cloud-api.livekit.io/api/sandbox/connection-details', {
          method: 'POST',
          headers: { 'X-Sandbox-ID': SANDBOX_ID, 'Content-Type': 'application/json' },
          body: JSON.stringify({ participant_name: 'user_' + Math.random().toString(36).slice(2,7) })
        });
        if (!res.ok) throw new Error('Could not get connection details');
        const data = await res.json();
        const err = await connect(data.serverUrl, data.participantToken);
        if (err) { status('ERROR', ''); btn.textContent = 'Connect'; btn.disabled = false; }
        else { btn.textContent = 'Disconnect'; btn.classList.add('disc'); btn.disabled = false; }
      } catch(e) {
        status('ERROR', '');
        btn.textContent = 'Connect'; btn.disabled = false;
      }
    });
  </script>
