<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>JERICHO — Personal AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/livekit-client@2.5.3/dist/livekit-client.umd.min.js"></script>
  <style>
    :root {
      --bg: #04060e;
      --surface: #090c1a;
      --border: rgba(255,255,255,0.06);
      --accent: #00d4ff;
      --gold: #e8b84b;
      --gold-dim: rgba(232,184,75,0.4);
      --text: #e8ecf5;
      --muted: #6a7290;
      --danger: #ff4f4f;
      /* Avatar presence: ~2x on desktop, auto-shrinks to fit phones */
      --avatar: clamp(220px, 60vw, 400px);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      position: relative;
    }

    /* ── GRID ── */
    .grid-bg {
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(0,212,255,0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,212,255,0.02) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none; z-index: 0;
    }

    /* ── AMBIENT GLOW ── */
    .ambient {
      position: fixed; top: 50%; left: 50%;
      transform: translate(-50%, -55%);
      width: 500px; height: 500px;
      background: radial-gradient(ellipse, rgba(0,212,255,0.055) 0%, transparent 68%);
      pointer-events: none; z-index: 0;
      transition: background 0.8s ease;
    }
    .ambient.speaking {
      background: radial-gradient(ellipse, rgba(0,212,255,0.13) 0%, rgba(232,184,75,0.04) 50%, transparent 70%);
    }

    /* ── NOISE ── */
    body::before {
      content: ''; position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.035'/%3E%3C/svg%3E");
      pointer-events: none; z-index: 999; opacity: 0.3;
    }

    /* ── CARD ── */
    .card {
      position: relative; z-index: 1;
      display: flex; flex-direction: column;
      align-items: center; gap: 0;
      width: 100%; max-width: 400px;
      padding: 0 2rem;
    }

    /* ── WORDMARK ── */
    .wordmark {
      font-family: 'Syne', sans-serif; font-weight: 800;
      font-size: 0.68rem; letter-spacing: 0.38em; text-transform: uppercase;
      color: var(--muted); margin-bottom: 2.5rem;
      opacity: 0; animation: fadeUp 0.6s 0.1s ease forwards;
    }
    .wordmark span { color: var(--accent); }

    /* ── AVATAR WRAP ── */
    .avatar-wrap {
      position: relative;
      width: var(--avatar); height: var(--avatar);
      margin-bottom: 2.2rem;
      opacity: 0; animation: fadeUp 0.8s 0.3s ease forwards;
      display: flex; align-items: center; justify-content: center;
    }

    /* Orbital rings — centered on the mane */
    .ring {
      position: absolute;
      border-radius: 50%;
      pointer-events: none;
      top: 50%; left: 50%;
    }
    .ring-1 {
      width: calc(var(--avatar) * 1.067); height: calc(var(--avatar) * 1.067);
      transform: translate(-50%, -50%);
      border: 1px solid rgba(0,212,255,0.1);
      transition: border-color 0.5s;
    }
    .ring-2 {
      width: calc(var(--avatar) * 1.181); height: calc(var(--avatar) * 1.181);
      transform: translate(-50%, -50%);
      border: 1px solid rgba(0,212,255,0.05);
      transition: border-color 0.5s;
    }
    .ring.active { border-color: rgba(0,212,255,0.35) !important; }
    .ring-2.active { border-color: rgba(232,184,75,0.12) !important; }

    /* Scan pulse ring */
    .scan-ring {
      position: absolute;
      width: calc(var(--avatar) * 1.067); height: calc(var(--avatar) * 1.067);
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      border: 1px solid var(--accent);
      opacity: 0; pointer-events: none;
    }
    .scan-ring.animate {
      animation: scanPulse 1.6s ease-out infinite;
    }

    @keyframes scanPulse {
      0%   { transform: translate(-50%, -50%) scale(1);   opacity: 0.5; }
      100% { transform: translate(-50%, -50%) scale(1.25); opacity: 0; }
    }

    /* ── MASK SVG ── */
    .mask-svg {
      width: var(--avatar); height: var(--avatar);
      overflow: visible;
      filter: drop-shadow(0 8px 32px rgba(0,0,0,0.7));
    }

    /* Eye slits — base state. transform-box keeps the blink scaling around each eye. */
    .eye-slit {
      transition: opacity 0.3s;
      transform-box: fill-box;
      transform-origin: center;
    }
    .eye-core {
      transform-box: fill-box;
      transform-origin: center;
    }

    /* Speaking: pulse glow */
    @keyframes eyePulse {
      0%, 100% { opacity: 0.88; }
      50%       { opacity: 1;    }
    }
    .eye-slit.speaking { animation: eyePulse 0.7s ease-in-out infinite; }

    /* Connecting: dim eyes that brighten */
    @keyframes eyeBoot {
      0%   { opacity: 0.1; }
      60%  { opacity: 0.7; }
      100% { opacity: 0.88; }
    }
    .eye-slit.booting { animation: eyeBoot 1.2s ease forwards; }

    /* ── STATUS ── */
    .status-wrap {
      display: flex; align-items: center; gap: 0.55rem;
      margin-bottom: 2.5rem; min-height: 26px;
      opacity: 0; animation: fadeUp 0.6s 0.5s ease forwards;
    }
    .status-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--muted); flex-shrink: 0;
      transition: background 0.3s, box-shadow 0.3s;
    }
    .status-dot.connected  { background: var(--accent); box-shadow: 0 0 8px rgba(0,212,255,0.6); }
    .status-dot.listening  { background: var(--accent); box-shadow: 0 0 8px rgba(0,212,255,0.6); animation: breathe 2s infinite; }
    .status-dot.speaking   { background: var(--gold);   box-shadow: 0 0 12px rgba(232,184,75,0.9); }
    .status-dot.error      { background: var(--danger); }
    .status-text {
      font-family: 'Syne', sans-serif; font-size: 0.7rem;
      font-weight: 600; letter-spacing: 0.18em; text-transform: uppercase;
      color: var(--muted); transition: color 0.3s;
    }
    .status-text.active { color: var(--accent); }
    .status-text.gold   { color: var(--gold); }

    /* ── BUTTONS ── */
    .btn-connect {
      font-family: 'Syne', sans-serif; font-size: 0.8rem;
      font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase;
      padding: 1rem 3rem; background: var(--accent); color: var(--bg);
      border: none; cursor: pointer; position: relative;
      transition: transform 0.2s, box-shadow 0.2s, opacity 0.3s;
      box-shadow: 0 0 30px rgba(0,212,255,0.3);
      opacity: 0; animation: fadeUp 0.6s 0.7s ease forwards;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-connect:hover  { transform: translateY(-2px); box-shadow: 0 0 50px rgba(0,212,255,0.5); }
    .btn-connect:active { transform: translateY(0); }
    .btn-connect:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    .btn-disconnect {
      font-family: 'Syne', sans-serif; font-size: 0.72rem; font-weight: 600;
      letter-spacing: 0.14em; text-transform: uppercase;
      padding: 0.65rem 2rem; background: transparent;
      color: var(--muted); border: 1px solid var(--border);
      cursor: pointer; margin-top: 1rem;
      transition: border-color 0.2s, color 0.2s; display: none;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-disconnect:hover { border-color: var(--danger); color: var(--danger); }

    /* ── WAVEFORM ── */
    .waveform {
      display: none; gap: 3px; align-items: flex-end;
      height: 22px; margin-top: 1.2rem;
    }
    .waveform .bar {
      width: 3px; background: var(--accent); border-radius: 2px;
      opacity: 0.4; height: 4px; transition: height 0.1s;
    }

    /* ── ANIMS ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes breathe {
      0%,100% { opacity: 1; } 50% { opacity: 0.35; }
    }

    /* Avatar sizes responsively via --avatar (clamp), so no fixed small-screen override is needed. */
  </style>
</head>
<body>

<div class="grid-bg"></div>
<div class="ambient" id="ambient"></div>

<div class="card">

  <p class="wordmark"><span>APERTURE</span> AUTOMATIONS</p>

  <!-- Avatar -->
  <div class="avatar-wrap" id="avatarWrap">

    <svg class="mask-svg" viewBox="0 0 680 680" xmlns="http://www.w3.org/2000/svg">

        <!-- mane inner layer -->

        <!-- light fur strokes (catching rim light) -->

          <line x1="340" y1="180" x2="340" y2="105"/><line x1="240" y1="207" x2="202" y2="142"/><line x1="440" y1="207" x2="478" y2="142"/><line x1="167" y1="280" x2="102" y2="242"/><line x1="513" y1="280" x2="578" y2="242"/><line x1="140" y1="380" x2="65" y2="380"/><line x1="540" y1="380" x2="615" y2="380"/><line x1="288" y1="187" x2="269" y2="114"/><line x1="392" y1="187" x2="411" y2="114"/>
        </g>
        <!-- bright cool rim-light on top mane tips -->
        <path d="M310,118 L340,86 L370,118" fill="none" stroke="#6fc4e0" stroke-width="1.8" opacity="0.85" stroke-linejoin="round" stroke-linecap="round"/>

        <path d="M340,86 L401,153" fill="none" stroke="#00d4ff" stroke-width="1" opacity="0.4"/>
        <path d="M340,86 L279,153" fill="none" stroke="#00d4ff" stroke-width="1" opacity="0.4"/>
        <!-- ruff framing the face -->
        <path d="M340,272 C300,272 268,290 256,318 Q250,300 244,352 C242,418 262,478 296,514 C318,540 340,552 340,552 C340,552 362,540 384,514 C418,478 438,418 436,352 Q430,300 424,318 C412,290 380,272 340,272 Z" fill="#22304e"/>
        <!-- face base -->
        <path d="M340,282 C288,282 254,310 252,360 C250,424 268,478 300,512 C320,536 340,548 340,548 C340,548 360,536 380,512 C412,478 430,424 428,360 C426,310 392,282 340,282 Z" fill="#1b2742"/>
        <!-- cheek shadows -->
        <path d="M254,366 L298,394 L294,496 L272,472 C258,440 252,402 254,366 Z" fill="#121c30"/>

        <path d="M260,360 L306,346 L322,370 L302,363 L274,374 Z" fill="#0a1122"/>
        <path d="M420,360 L374,346 L358,370 L378,363 L406,374 Z" fill="#0a1122"/>
        <path d="M338,348 L332,376 M342,348 L348,376" stroke="#0a1122" stroke-width="3" fill="none" stroke-linecap="round"/>

        <!-- ══ EYES (reactive — driven by the state machine) ══ -->
        <!-- LEFT: static socket shadow, then the glowing eye + white core the JS controls -->
        <path d="M328,394 Q298,364 258,360 Q276,390 328,394 Z" fill="#050b14"/>
        <path id="leftEye" class="eye-slit" d="M326,392 Q298,366 262,363 Q280,388 326,392 Z"
              fill="var(--accent)" opacity="0.88" filter="url(#eyeGlow)"/>
        <ellipse id="leftEyeCore" class="eye-core" cx="293" cy="379" rx="11" ry="4.5" fill="#ffffff" opacity="0.5"/>

        <path d="M352,394 Q382,364 422,360 Q404,390 352,394 Z" fill="#050b14"/>

              fill="var(--accent)" opacity="0.88" filter="url(#eyeGlow)"/>
        <ellipse id="rightEyeCore" class="eye-core" cx="387" cy="379" rx="11" ry="4.5" fill="#ffffff" opacity="0.5"/>

        <!-- whiskers -->

          <path d="M276,510 Q244,504 218,510"/><path d="M276,517 Q244,522 220,531"/><path d="M404,510 Q436,504 462,510"/><path d="M404,517 Q436,522 460,531"/>

  </div>

  <!-- Status -->
  <div class="status-wrap">
    <div class="status-dot" id="statusDot"></div>
    <span class="status-text" id="statusText">Standby</span>
  </div>

  <!-- Connect -->
  <button class="btn-connect" id="btnConnect" onclick="connect()">Activate Jericho</button>

  <!-- Waveform -->
  <div class="waveform" id="waveform">
    <div class="bar"></div><div class="bar"></div><div class="bar"></div>
    <div class="bar"></div><div class="bar"></div><div class="bar"></div>
    <div class="bar"></div><div class="bar"></div><div class="bar"></div>
  </div>

  <!-- Disconnect -->
  <button class="btn-disconnect" id="btnDisconnect" onclick="disconnect()">End Session</button>

</div>

<script>
  const RAILWAY_URL = 'https://successful-alignment-production-7ed0.up.railway.app';
  const ROOM_NAME   = 'lloyd-personal';
  const IDENTITY    = 'lloyd';

  let room = null;
  let agentState = 'idle';

  // UI refs
  const statusDot     = document.getElementById('statusDot');
  const statusText    = document.getElementById('statusText');
  const btnConnect    = document.getElementById('btnConnect');
  const btnDisconnect = document.getElementById('btnDisconnect');
  const waveform      = document.getElementById('waveform');
  const ring1         = document.getElementById('ring1');
  const ring2         = document.getElementById('ring2');
  const scanRing      = document.getElementById('scanRing');
  const ambient       = document.getElementById('ambient');

  // Eyes
  const leftEye      = document.getElementById('leftEye');
  const rightEye     = document.getElementById('rightEye');
  const leftEyeCore  = document.getElementById('leftEyeCore');
  const rightEyeCore = document.getElementById('rightEyeCore');

  // Gold trim elements
  const goldTrimEls = document.querySelectorAll('.gold-trim');

  // ── STATE MACHINE ─────────────────────────────────────────────────────────

  function setState(s) {
    agentState = s;

    // Status dot
    statusDot.className = 'status-dot ' + ({
      connecting: '',
      connected:  'connected',
      listening:  'listening',
      speaking:   'speaking',
      error:      'error',
    }[s] || '');

    // Status text
    statusText.className = 'status-text' +
      (s === 'speaking' ? ' gold' : s !== 'idle' && s !== 'error' ? ' active' : '');
    statusText.textContent = {
      idle:       'Standby',
      connecting: 'Initializing…',
      connected:  'Connected',
      listening:  'Listening',
      speaking:   'Speaking',
      error:      'Connection failed',
    }[s] || 'Standby';

    // Rings
    const isActive = !['idle','error'].includes(s);
    ring1.classList.toggle('active', isActive);
    ring2.classList.toggle('active', isActive);
    scanRing.classList.toggle('animate', s === 'speaking');
    ambient.classList.toggle('speaking', s === 'speaking');

    // Buttons
    if (['idle','error'].includes(s)) {
      btnConnect.style.display    = 'block';
      btnConnect.disabled         = false;
      btnConnect.textContent      = s === 'error' ? 'Retry' : 'Activate Jericho';
      btnDisconnect.style.display = 'none';
      waveform.style.display      = 'none';
    } else if (s === 'connecting') {
      btnConnect.disabled   = true;
      btnConnect.textContent = 'Initializing…';
    } else {
      btnConnect.style.display    = 'none';
      btnDisconnect.style.display = 'block';
      waveform.style.display      = 'flex';
    }

    // Eyes
    updateEyes(s);

    // Gold trim
    goldTrimEls.forEach(el => el.classList.toggle('speaking', s === 'speaking'));

    // Waveform
    animateWaveform(s === 'speaking');
  }

  // ── EYES ──────────────────────────────────────────────────────────────────

  let blinkTimer = null;

  function setEyeScale(sy) {
    [leftEye, rightEye].forEach(el => {
      el.style.transform      = `scaleY(${sy})`;
      el.style.transformOrigin = '50% 50%';
    });
    [leftEyeCore, rightEyeCore].forEach(el => {
      el.style.transform      = `scaleY(${sy})`;
      el.style.transformOrigin = '50% 50%';
      el.style.opacity = sy < 0.3 ? '0' : '0.5';
    });
  }

  function blink() {
    setEyeScale(0.08);
    setTimeout(() => setEyeScale(1), 90);
  }

  function startBlink() {
    stopBlink();
    const schedule = () => {
      blinkTimer = setTimeout(() => {
        if (['connected','listening'].includes(agentState)) {
          blink();
          if (Math.random() < 0.18) setTimeout(blink, 210);
        }
        schedule();
      }, 2800 + Math.random() * 2400);
    };
    schedule();
  }

  function stopBlink() {
    clearTimeout(blinkTimer);
    setEyeScale(1);
  }

  function updateEyes(s) {
    // Clear all eye classes
    [leftEye, rightEye].forEach(el => {
      el.classList.remove('speaking', 'booting');
      el.setAttribute('filter', 'url(#eyeGlow)');
    });

    if (s === 'idle' || s === 'error') {
      stopBlink();
      setEyeScale(1);
      [leftEye, rightEye].forEach(el => el.style.opacity = '0.25');
      [leftEyeCore, rightEyeCore].forEach(el => el.style.opacity = '0.1');

    } else if (s === 'connecting') {
      stopBlink();
      [leftEye, rightEye].forEach(el => {
        el.style.opacity = '0.88';
        el.classList.add('booting');
      });
      [leftEyeCore, rightEyeCore].forEach(el => el.style.opacity = '0.5');

    } else if (s === 'connected' || s === 'listening') {
      [leftEye, rightEye].forEach(el => {
        el.style.opacity = '0.88';
      });
      [leftEyeCore, rightEyeCore].forEach(el => el.style.opacity = '0.5');
      startBlink();

    } else if (s === 'speaking') {
      stopBlink();
      setEyeScale(1);
      [leftEye, rightEye].forEach(el => {
        el.style.opacity = '1';
        el.classList.add('speaking');
        el.setAttribute('filter', 'url(#eyeGlowX)');
      });
      [leftEyeCore, rightEyeCore].forEach(el => el.style.opacity = '0.85');
    }
  }

  // ── WAVEFORM ──────────────────────────────────────────────────────────────

  let waveInt = null;
  const bars = waveform.querySelectorAll('.bar');

  function animateWaveform(on) {
    clearInterval(waveInt);
    if (on) {
      waveInt = setInterval(() => {
        bars.forEach(b => {
          const h = 2 + Math.random() * 18;
          b.style.height  = h + 'px';
          b.style.opacity = (0.25 + (h / 20) * 0.75).toFixed(2);
        });
      }, 90);
    } else {
      bars.forEach(b => { b.style.height = '4px'; b.style.opacity = '0.3'; });
    }
  }

  // ── CONNECTION ────────────────────────────────────────────────────────────

  async function connect() {
    setState('connecting');
    try {
      // Step 1: Fetch token
      let token, url;
      try {
        const ctrl = new AbortController();
        const tid  = setTimeout(() => ctrl.abort(), 12000);
        let res;
        try {
          res = await fetch(`${RAILWAY_URL}/token`, { signal: ctrl.signal });
        } finally {
          clearTimeout(tid);
        }
        if (!res.ok) throw new Error(`Token server returned ${res.status}`);
        const data = await res.json();
        token = data.token;
        url   = data.serverUrl;
        if (!token || !url) throw new Error(`Bad token response: ${JSON.stringify(data)}`);
      } catch(e) {
        throw new Error(`Token fetch failed: ${e.message}`);
      }

      room = new LivekitClient.Room({
        adaptiveStream: true,
        dynacast: true,
        audioCaptureDefaults: {
          autoGainControl: true,
          echoCancellation: true,
          noiseSuppression: true,
        },
      });

      let agentAudioEl = null;

      room.on(LivekitClient.RoomEvent.Connected, async () => {
        setState('listening');
        await room.localParticipant.setMicrophoneEnabled(true);
        // (removed the dead /dispatch call — the agent auto-joins lloyd-personal)
      });

      room.on(LivekitClient.RoomEvent.Disconnected, () => {
        setState('idle'); room = null;
      });

      room.on(LivekitClient.RoomEvent.ActiveSpeakersChanged, (speakers) => {
        if (!room) return;
        const agentTalking = speakers.some(s => s.identity !== IDENTITY);
        if (agentTalking) setState('speaking');
        else if (agentState !== 'idle') setState('listening');
      });

      room.on(LivekitClient.RoomEvent.TrackSubscribed, (track) => {
        if (track.kind === LivekitClient.Track.Kind.Audio) {
          if (agentAudioEl) { try { agentAudioEl.remove(); } catch (e) {} }
          agentAudioEl = track.attach();
          agentAudioEl.autoplay = true;
          agentAudioEl.playsInline = true;
          document.body.appendChild(agentAudioEl);
        }
      });

      room.on(LivekitClient.RoomEvent.TrackUnsubscribed, (track) => {
        track.detach().forEach(el => el.remove());
        agentAudioEl = null;
      });
      

      await room.connect(url, token);

    } catch (err) {
      console.error('Jericho connection error:', err);
      setState('error');
      statusText.textContent = err.message || 'Connection failed';
    }
  }

  async function disconnect() {
    if (room) { await room.disconnect(); room = null; }
    setState('idle');
  }

  // ── BOOT ──────────────────────────────────────────────────────────────────
  setState('idle');
</script>
</body>
